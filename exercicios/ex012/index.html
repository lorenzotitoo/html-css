<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <H1>Inserindo vídeos hospedados localmente</H1>
    <p>Este vídeo está hospedado no meu próprio serrvidor</p>
    <video controls width="500" preload="metadata" muted autoplay >
        <source src="Meuvideo.Mp4.mp4" type="video/mp4">
        <p>Seu navegador não tem compatibilidade com reprodução de videos.</p>
</video>

<h1>Inserindo Videos do YouTube</h1>
<iframe width="560" height="315" src="https://www.youtube.com/embed/rx8EhkXk9zs?si=uu8RtDFa0LEmb4YL&start=10"  title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>
</html>
